<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="シンプルで使いやすいロール管理アプリケーション">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ロール管理">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='96' fill='white' font-family='Arial'>📋</text></svg>">
    <title>ロール管理アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 0;
            text-align: center;
            border-bottom: 4px solid #5568d3;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .content {
            padding: 30px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-bar input:focus,
        .role-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-bar button {
            padding: 12px 18px;
            border: none;
            background: #f5f5f5;
            color: #333;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .search-bar button:hover {
            background: #e6e6e6;
            transform: translateY(-1px);
        }

        .sort-select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
            color: #333;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .sort-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .role-count {
            margin-top: 12px;
            color: #4a5568;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .sync-message {
            margin-top: 10px;
            color: #047857;
            font-size: 0.95rem;
            min-height: 1.2rem;
            font-weight: 600;
        }

        .role-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .role-form input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .role-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .role-form button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 0 0 auto;
            min-width: 140px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .csv-btn {
            background: linear-gradient(135deg, #f39c12 0%, #d35400 100%);
        }

        .import-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }

        .role-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .role-form button:active {
            transform: translateY(0);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 0.95rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        .role-id {
            font-weight: 600;
            color: #667eea;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .edit-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.3);
        }

        .delete-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 112, 154, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px 0;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .content {
                padding: 20px;
            }

            .role-form {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 20px;
            }

            .role-form input,
            .role-form button {
                width: 100%;
            }

            th, td {
                padding: 10px;
                font-size: 0.9rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
                padding: 10px;
            }

            .role-id {
                display: block;
                margin-bottom: 5px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5rem;
            }

            .content {
                padding: 15px;
            }

            th {
                padding: 10px 5px;
                font-size: 0.8rem;
            }

            td {
                padding: 10px 5px;
                font-size: 0.85rem;
            }

            .action-btn {
                padding: 8px 10px;
                font-size: 0.75rem;
            }
        }

        /* ログイン画面スタイル */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            margin-bottom: 30px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-form input {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-form button {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- ログイン画面 -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <h1>🔐 ロール管理アプリ</h1>
                <p>パスワードを入力してください</p>
            </div>
            <div class="login-form">
                <input type="password" id="password-input" placeholder="パスワード" maxlength="20">
                <button type="button" id="login-btn" onclick="login()">ログイン</button>
            </div>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-screen" class="main-screen" style="display: none;">
        <div class="header">
            <h1>� スタンド管理</h1>
            <button type="button" id="logout-btn" onclick="logout()" class="logout-btn">ログアウト</button>
        </div>

        <div class="container">
            <div class="content">
                <div class="search-bar">
                    <input type="search" id="role-search" placeholder="スタンド番号、ステータス、メモで検索..." aria-label="ロール検索" oninput="searchRoles(event)">
                    <select id="sort-select" class="sort-select" onchange="changeSort(event)">
                        <option value="updatedAt">最終更新日順</option>
                        <option value="name">スタンド番号順</option>
                    </select>
                    <button type="button" onclick="showAllRoles()">全件表示</button>
                    <button type="button" onclick="clearSearch()">クリア</button>
                </div>
                <div id="role-count" class="role-count"></div>
                <div id="sync-message" class="sync-message"></div>
                <div class="role-form">
                    <input type="text" id="role-name" placeholder="スタンド番号を入力 (例: #2-11)" style="flex: 1;">
                    <select id="role-status" style="padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 1rem; min-width: 200px; cursor: pointer;">
                        <option value="">ステータスを選択</option>
                        <option value="オンライン">オンライン</option>
                        <option value="中古予備（バラシ前）">中古予備（バラシ前）</option>
                        <option value="改削行き（搬出可能）">改削行き（搬出可能）</option>
                        <option value="改削中">改削中</option>
                        <option value="新品予備（組替可能）">新品予備（組替可能）</option>
                        <option value="新品予備（組込完了）">新品予備（組込完了）</option>
                    </select>
                    <textarea id="role-memo" placeholder="メモを入力...(改行可)" style="flex: 1; min-height: 40px; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 1rem; resize: vertical;"></textarea>
                    <input id="csv-import-input" type="file" accept=".csv,text/csv" style="display:none" onchange="importCsv(event)">
                    <div class="form-actions">
                        <button type="button" id="addRoleBtn" onclick="addRole()">➕ 追加</button>
                        <button type="button" id="updateRoleBtn" onclick="updateRole()" style="display: none;">🔄 更新</button>
                        <button type="button" id="cancelEditBtn" onclick="cancelEdit()" style="display: none;">❌ キャンセル</button>
                        <button type="button" id="exportCsvBtn" class="csv-btn" onclick="exportCsv()">CSVエクスポート</button>
                        <button type="button" class="import-btn" onclick="document.getElementById('csv-import-input').click()">CSVインポート</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="role-table">
                        <thead>
                            <tr>
                                <th>スタンド番号</th>
                                <th>ステータス</th>
                                <th>メモ</th>
                                <th>最終更新日</th>
                                <th style="width: 200px;">アクション</th>
                            </tr>
                        </thead>
                        <tbody id="role-list">
                            <!-- スタンドセットがここに表示されます -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = '1234';

        // ログイン状態チェック
        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const loginScreen = document.getElementById('login-screen');
            const mainScreen = document.getElementById('main-screen');

            if (isLoggedIn) {
                loginScreen.style.display = 'none';
                mainScreen.style.display = 'block';
                loadLocalRoles();
                renderRoles();
                if (isRemoteConfigured()) {
                    loadRemoteRoles();
                }
            } else {
                loginScreen.style.display = 'flex';
                mainScreen.style.display = 'none';
            }
        }

        // ログイン関数
        function login() {
            const password = document.getElementById('password-input').value;
            if (password === CORRECT_PASSWORD) {
                localStorage.setItem('isLoggedIn', 'true');
                checkLoginStatus();
                document.getElementById('password-input').value = ''; // パスワード入力クリア
            } else {
                alert('パスワードが間違っています');
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
            }
        }

        // ログアウト関数
        function logout() {
            if (confirm('ログアウトしますか？')) {
                localStorage.removeItem('isLoggedIn');
                checkLoginStatus();
            }
        }

        // Enterキーでログイン
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });

        const SHEETS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbx8fX108NgUJwJnJEz-MaV09bOu5iABNCHeNMUI5Zo-bNKpKJwVqlpzdELG6XWP-FI_/exec'; // 
        const ALLOWED_STATUSES = [
            'オンライン',
            '中古予備（バラシ前）',
            '改削行き（搬出可能）',
            '改削中',
            '新品予備（組替可能）',
            '新品予備（組込完了）'
        ];

        let roles = [];
        let nextId = 1;
        let searchQuery = '';
        let sortOption = 'updatedAt';
        let editingId = null; // 編集中のID

        function isRemoteConfigured() {
            return SHEETS_ENDPOINT.trim().length > 0;
        }

        function setSyncMessage(message, isError = false) {
            const syncEl = document.getElementById('sync-message');
            if (syncEl) {
                syncEl.textContent = message;
                syncEl.style.color = isError ? '#b91c1c' : '#047857';
            }
        }

        function saveLocalRoles() {
            localStorage.setItem('roles', JSON.stringify(roles));
        }

        function loadLocalRoles() {
            roles = JSON.parse(localStorage.getItem('roles')) || [];
            roles = roles.map(role => ({
                ...role,
                updatedAt: role.updatedAt || new Date().toISOString(),
                memo: role.memo || '',
                status: ALLOWED_STATUSES.includes(role.status) ? role.status : '中古予備（バラシ前）'
            }));
            fixOnlineDuplicates();
            const ids = roles.map(r => Number(r.id) || 0);
            nextId = ids.length > 0 ? Math.max(...ids) + 1 : 1;
        }

        async function loadRemoteRoles() {
            if (!isRemoteConfigured()) {
                setSyncMessage('同期先が設定されていません');
                return;
            }
            try {
                const response = await fetch(`${SHEETS_ENDPOINT}?action=fetch`);
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                const data = await response.json();
                if (!Array.isArray(data.roles)) {
                    throw new Error('不正なデータ形式です');
                }
                roles = data.roles.map(role => ({
                    ...role,
                    updatedAt: role.updatedAt || new Date().toISOString(),
                    memo: role.memo || '',
                    status: ALLOWED_STATUSES.includes(role.status) ? role.status : '中古予備（バラシ前）'
                }));
                fixOnlineDuplicates();
                saveLocalRoles();
                const ids = roles.map(r => Number(r.id) || 0);
                nextId = ids.length > 0 ? Math.max(...ids) + 1 : 1;
                renderRoles();
                setSyncMessage('同期完了');
            } catch (error) {
                console.error(error);
                setSyncMessage('同期失敗。ローカルに保存しました', true);
                renderRoles();
            }
        }

        async function saveRemoteRoles() {
            if (!isRemoteConfigured()) {
                return false;
            }
            try {
                const response = await fetch(SHEETS_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ roles })
                });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                const data = await response.json();
                return data && data.success === true;
            } catch (error) {
                console.error(error);
                return false;
            }
        }

        async function syncRoles() {
            saveLocalRoles();
            if (!isRemoteConfigured()) {
                setSyncMessage('同期先が設定されていません');
                return;
            }
            const ok = await saveRemoteRoles();
            if (ok) {
                setSyncMessage('同期完了');
            } else {
                setSyncMessage('同期失敗。ローカルに保存しました', true);
            }
        }

        function fixOnlineDuplicates() {
            const groups = {};
            roles.forEach(role => {
                const group = getGroup(role.name);
                if (!groups[group]) groups[group] = [];
                groups[group].push(role);
            });
            Object.values(groups).forEach(groupRoles => {
                const onlineRoles = groupRoles.filter(r => r.status === 'オンライン').sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
                if (onlineRoles.length > 1) {
                    for (let i = 1; i < onlineRoles.length; i++) {
                        onlineRoles[i].status = '中古予備（バラシ前）';
                    }
                }
            });
            saveLocalRoles();
        }

        function getGroup(name) {
            return String(name || '').split('-')[0];
        }

        loadLocalRoles();

        function changeSort(event) {
            sortOption = event.target.value;
            renderRoles();
        }

        function getLevelBadge(level) {
            const badges = {
                '管理者': '<span style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">👑 管理者</span>',
                '編集者': '<span style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">✏️ 編集者</span>',
                '閲覧者': '<span style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">👁️ 閲覧者</span>'
            };
            return badges[level] || '-';
        }

        function getStatusBadge(status) {
            const badges = {
                'オンライン': '<span style="background: #16a085; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">オンライン</span>',
                '中古予備（バラシ前）': '<span style="background: #f39c12; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">中古予備（バラシ前）</span>',
                '改削行き（搬出可能）': '<span style="background: #e74c3c; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">改削行き（搬出可能）</span>',
                '改削中': '<span style="background: #c0392b; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">改削中</span>',
                '新品予備（組替可能）': '<span style="background: #27ae60; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">新品予備（組替可能）</span>',
                '新品予備（組込完了）': '<span style="background: #2980b9; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">新品予備（組込完了）</span>'
            };
            return badges[status] || `<span style="background: #95a5a6; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;">${escapeHtml(status)}</span>`;
        }

        function getMemoPreview(memo) {
            const normalized = (memo || '').replace(/\n/g, ' ').trim();
            if (!normalized) {
                return '-';
            }
            return normalized.length > 50 ? normalized.slice(0, 50) + '…' : normalized;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function showMemo(id) {
            const role = roles.find(r => r.id === id);
            if (!role) {
                alert('ロールが見つかりません');
                return;
            }
            const memoText = role.memo || 'メモはありません';
            alert(memoText);
        }

        function searchRoles(event) {
            searchQuery = event.target.value || '';
            renderRoles();
        }

        function clearSearch() {
            searchQuery = '';
            const searchInput = document.getElementById('role-search');
            if (searchInput) {
                searchInput.value = '';
            }
            renderRoles();
        }

        function showAllRoles() {
            clearSearch();
        }

        function getFilteredRoles() {
            const normalizedQuery = String(searchQuery).trim().toLowerCase();
            if (!normalizedQuery) {
                return roles;
            }
            return roles.filter(role => {
                return [
                    String(role.name || ''),
                    String(role.status || ''),
                    String(role.memo || '')
                ].some(field => field.toLowerCase().includes(normalizedQuery));
            });
        }

        function renderRoles() {
            const roleList = document.getElementById('role-list');
            roleList.innerHTML = '';
            
            const visibleRoles = getFilteredRoles()
                .slice()
                .sort((a, b) => {
                    if (sortOption === 'name') {
                        return a.name.localeCompare(b.name, 'ja');
                    }
                    return new Date(b.updatedAt) - new Date(a.updatedAt);
                });
            const countInfo = document.getElementById('role-count');
            if (countInfo) {
                if (searchQuery.trim()) {
                    countInfo.textContent = `現在${visibleRoles.length}件表示中 / 全${roles.length}件`;
                } else {
                    countInfo.textContent = '';
                }
            }
            if (visibleRoles.length === 0) {
                const message = roles.length === 0
                    ? 'ロールがまだ登録されていません'
                    : '検索条件に一致するロールが見つかりません';
                roleList.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">${message}</td></tr>`;
                return;
            }

            visibleRoles.forEach(role => {
                const row = document.createElement('tr');
                const updatedDate = new Date(role.updatedAt);
                const formattedDate = updatedDate.toLocaleString('ja-JP', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                row.innerHTML = `
                    <td><span class="role-id">${escapeHtml(role.name)}</span></td>
                    <td>${getStatusBadge(role.status)}</td>
                    <td>${escapeHtml(getMemoPreview(role.memo))}</td>
                    <td>${formattedDate}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn edit-btn" onclick="editRole(${role.id})">✏️ 編集</button>
                            <button class="action-btn edit-btn" onclick="showMemo(${role.id})">📝 詳細</button>
                            <button class="action-btn delete-btn" onclick="deleteRole(${role.id})">🗑️ 削除</button>
                        </div>
                    </td>
                `;
                roleList.appendChild(row);
            });
        }

        function addRole() {
            const roleName = document.getElementById('role-name').value.trim();
            const roleStatus = document.getElementById('role-status').value;
            const roleMemo = document.getElementById('role-memo').value.trim();
            
            if (!roleName) {
                alert('スタンド番号を入力してください');
                return;
            }
            if (!roleStatus) {
                alert('ステータスを選択してください');
                return;
            }
            if (roles.some(r => r.name === roleName)) {
                alert('このスタンド番号は既に登録されています');
                return;
            }
            const newRole = { id: nextId++, name: roleName, status: roleStatus, memo: roleMemo, updatedAt: new Date().toISOString() };
            
            // オンライン重複制御
            if (roleStatus === 'オンライン') {
                const group = getGroup(roleName);
                roles.forEach(r => {
                    if (getGroup(r.name) === group && r.status === 'オンライン') {
                        r.status = '中古予備（バラシ前）';
                        r.updatedAt = new Date().toISOString();
                    }
                });
            }
            
            roles.push(newRole);
            saveLocalRoles();
            document.getElementById('role-name').value = '';
            document.getElementById('role-status').value = '';
            document.getElementById('role-memo').value = '';
            renderRoles();
            syncRoles();
        }

        function parseCsv(csvText) {
            const rows = [];
            let row = [];
            let value = '';
            let inQuotes = false;
            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                if (inQuotes) {
                    if (char === '"') {
                        if (csvText[i + 1] === '"') {
                            value += '"';
                            i++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        value += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(value);
                        value = '';
                    } else if (char === '\r') {
                        continue;
                    } else if (char === '\n') {
                        row.push(value);
                        rows.push(row);
                        row = [];
                        value = '';
                    } else {
                        value += char;
                    }
                }
            }
            if (value !== '' || row.length > 0) {
                row.push(value);
                rows.push(row);
            }
            return rows;
        }

        function importCsv(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    let text = e.target.result;
                    if (text.charCodeAt(0) === 0xFEFF) {
                        text = text.slice(1);
                    }
                    const rows = parseCsv(text).filter(row => row.length > 0 && row.some(cell => cell.trim() !== ''));
                    if (rows.length === 0) {
                        alert('CSVにデータがありません');
                        return;
                    }
                    const header = rows[0].map(cell => cell.trim().toLowerCase());
                    let startIndex = 0;
                    if (header[0] && header[0].includes('id') && header[1] && (header[1].includes('スタンド') || header[1].includes('name'))) {
                        startIndex = 1;
                    }
                    const hasStatusColumn = header.some(cell => cell.includes('ステータス') || cell.includes('status'));
                    const importedRoles = [];
                    for (let i = startIndex; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length < 2) {
                            continue;
                        }
                        const rawId = parseInt(row[0].trim(), 10);
                        const name = row[1].trim();
                        const status = hasStatusColumn ? (row[2] ? row[2].trim() : 'オンライン') : 'オンライン';
                        const memo = hasStatusColumn ? (row[3] ? row[3].trim() : '') : (row[2] ? row[2].trim() : '');
                        const updatedAt = hasStatusColumn ? (row[4] ? row[4].trim() : new Date().toISOString()) : (row[3] ? row[3].trim() : new Date().toISOString());
                        if (!name) {
                            continue;
                        }
                        const validStatuses = ['オンライン', '中古予備（バラシ前）', '改削行き（搬出可能）', '改削中', '新品予備（組替可能）', '新品予備（組込完了）'];
                        if (!validStatuses.includes(status)) {
                            continue;
                        }
                        importedRoles.push({ id: isNaN(rawId) ? null : rawId, name, status, memo, updatedAt });
                    }
                    if (importedRoles.length === 0) {
                        alert('有効なロールデータがありません');
                        return;
                    }
                    let maxId = nextId - 1;
                    importedRoles.forEach(role => {
                        if (!role.id || role.id <= 0 || isNaN(role.id)) {
                            role.id = ++maxId;
                        } else if (role.id > maxId) {
                            maxId = role.id;
                        }
                    });
                    roles = importedRoles;
                    nextId = maxId + 1;
                    fixOnlineDuplicates();
                    saveLocalRoles();
                    renderRoles();
                    syncRoles();
                    alert('CSVからロールを読み込みました');
                } catch (error) {
                    alert('CSVの読み込みに失敗しました: ' + error.message);
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsText(file, 'UTF-8');
        }

        function exportCsv() {
            if (roles.length === 0) {
                alert('エクスポートするロールがありません');
                return;
            }
            const headers = ['ID', 'スタンド番号', 'ステータス', 'メモ', '最終更新日'];
            const rows = roles.map(role => [
                role.id,
                role.name,
                role.status || '',
                role.memo || '',
                role.updatedAt
            ]);
            const csv = [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\r\n');
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'roles.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function editRole(id) {
            const role = roles.find(r => r.id === id);
            if (!role) return;
            
            editingId = id;
            document.getElementById('role-name').value = role.name;
            document.getElementById('role-status').value = role.status;
            document.getElementById('role-memo').value = role.memo || '';
            
            document.getElementById('addRoleBtn').style.display = 'none';
            document.getElementById('updateRoleBtn').style.display = 'inline-block';
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
        }

        function updateRole() {
            if (editingId === null) return;
            
            const roleName = document.getElementById('role-name').value.trim();
            const roleStatus = document.getElementById('role-status').value;
            const roleMemo = document.getElementById('role-memo').value.trim();
            
            if (!roleName) {
                alert('スタンド番号を入力してください');
                return;
            }
            if (!roleStatus) {
                alert('ステータスを選択してください');
                return;
            }
            
            const role = roles.find(r => r.id === editingId);
            if (!role) return;
            
            if (roleName !== role.name && roles.some(r => r.id !== editingId && r.name === roleName)) {
                alert('このスタンド番号は既に登録されています');
                return;
            }
            
            if (roleStatus === 'オンライン') {
                const group = getGroup(roleName);
                roles.forEach(r => {
                    if (r.id !== editingId && getGroup(r.name) === group && r.status === 'オンライン') {
                        r.status = '中古予備（バラシ前）';
                        r.updatedAt = new Date().toISOString();
                    }
                });
            }
            
            role.name = roleName;
            role.status = roleStatus;
            role.memo = roleMemo;
            role.updatedAt = new Date().toISOString();
            
            saveLocalRoles();
            cancelEdit();
            renderRoles();
            syncRoles();
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('role-name').value = '';
            document.getElementById('role-status').value = '';
            document.getElementById('role-memo').value = '';
            
            document.getElementById('addRoleBtn').style.display = 'inline-block';
            document.getElementById('updateRoleBtn').style.display = 'none';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function deleteRole(id) {
            if (confirm('このロールを削除しますか？')) {
                roles = roles.filter(r => r.id !== id);
                saveLocalRoles();
                renderRoles();
                syncRoles();
            }
        }

        // 初期表示
        checkLoginStatus();

        const searchInput = document.getElementById('role-search');
        if (searchInput) {
            searchInput.addEventListener('input', (event) => {
                searchQuery = event.target.value;
                renderRoles();
            });
        }

        // Service Worker登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(registration => {
                    console.log('Service Worker registered:', registration);
                    
                    // 新しいService Workerの更新をチェック
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'activated') {
                                console.log('New Service Worker activated');
                                // 自動リロード
                                window.location.reload();
                            }
                        });
                    });

                    // Service Workerからのメッセージを処理
                    navigator.serviceWorker.addEventListener('message', event => {
                        if (event.data && event.data.type === 'SW_UPDATED') {
                            console.log('Service Worker updated, reloading...');
                            window.location.reload();
                        }
                    });

                    // 定期的に更新チェック（スマホ側自動更新用）
                    setInterval(() => {
                        registration.update();
                    }, 60000); // 1分ごとにチェック
                })
                .catch(error => console.log('Service Worker registration failed:', error));
        }

        // PWAインストール促進
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // インストール可能な場合の処理
            console.log('PWA install prompt is ready');
        });
    </script>
</body>
</html>
